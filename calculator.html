<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Banished - 자원 계산기</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <nav>
            <a href="index.html" class="logo">Banished</a>
            <ul>
                <li><a href="index.html">게임 소개</a></li>
                <li><a href="buildings.html">건물 소개</a></li>
                <li><a href="calculator.html">자원 계산기</a></li>
            </ul>
        </nav>
    </header>

    <main class="container">
        <section id="calculator">
            <h1>교역소 자원 교환 계산기</h1>
            <p>교역소에서 자원을 교환할 때 필요한 장작의 수량을 알려주는 계산기입니다.</p>
            
            <div class="calculator-form">
                <div class="form-group">
                    <label for="resource-select">자원 선택:</label>
                    <select id="resource-select"></select>
                </div>
                <div class="form-group">
                    <label for="quantity-input">수량:</label>
                    <input type="number" id="quantity-input" min="0" value="1">
                </div>
                <button type="button" id="calculate-btn">계산하기</button>
                <div id="result">
                    <p>교환 가능한 장작: <span id="total-value">0</span>개</p>
                </div>
            </div>
        </section>
    </main>
    <script src="script.js"></script>
</body>
</html>
